name: CI/CD Deploy Chatbot UI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          -t ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Stopping old container..."
          docker stop chatbot-ui || true
          docker rm chatbot-ui || true

          echo "Pulling latest image..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest

          echo "Running new container..."
          docker run -d -p 3000:3000 --name chatbot-ui \
            -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --restart always \
            ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest

          echo "Deployment successful!"
