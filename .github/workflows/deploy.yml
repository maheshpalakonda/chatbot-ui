name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configure AWS (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::800960611458:role/ecr
          aws-region: us-east-1

      # 3. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker Image
      - name: Build Image
        run: |
          docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          -t chatbot-ui .

      # 5. Tag Image
      - name: Tag Image
        run: |
          docker tag chatbot-ui:latest \
          800960611458.dkr.ecr.us-east-1.amazonaws.com/chatbot-ui:latest

      # 6. Push to ECR
      - name: Push Image
        run: |
          docker push \
          800960611458.dkr.ecr.us-east-1.amazonaws.com/chatbot-ui:latest
