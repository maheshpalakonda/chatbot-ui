name: Deploy Chatbot UI to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker Image (ONLY public envs here)
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest .

      # 4. Push Image to DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest

      # 5. Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop old container
            docker stop chatbot-ui || true
            docker rm chatbot-ui || true

            # Remove old image
            docker rmi ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest || true

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest

            # Run container (🔥 runtime secrets here)
            docker run -d \
              -p 3000:3000 \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              --name chatbot-ui \
              ${{ secrets.DOCKER_USERNAME }}/chatbot-ui:latest
